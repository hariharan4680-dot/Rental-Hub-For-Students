<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Profile - Rental Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/dashboard.css') }}">
</head>
<body>
  <div class="form-container">
    <h2>Update Profile</h2>
    <form id="updateProfileForm">
      <input type="text" id="name" placeholder="Name" required><br>
      <input type="email" id="email" placeholder="Email" required><br>
      <input type="password" id="password" placeholder="New Password (optional)"><br>
      <button type="submit" class="btn">Save Changes</button>
    </form>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "{{ url_for('login_page') }}";
    }

    // ✅ Pre-fill current data
    async function loadProfile() {
      const res = await fetch("/api/profile", {
        headers: { "Authorization": "Bearer " + token }
      });
      const data = await res.json();
      document.getElementById("name").value = data.user.name;
      document.getElementById("email").value = data.user.email;
    }

    // ✅ Submit Update
    document.getElementById("updateProfileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const updated = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      const res = await fetch("/api/update-profile", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(updated)
      });

      const data = await res.json();
      alert(data.message);
      window.location.href = "{{ url_for('dashboard_page') }}";
    });

    loadProfile();
  </script>
</body>
</html>
