<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Rental Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/style.css') }}">
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <h1 class="title">Register</h1>
      <p class="tagline">Create an account to start sharing & finding rentals.</p>

      <form id="registerForm">
        <input type="text" id="name" class="input-field" placeholder="Full Name" required>
        <input type="email" id="email" class="input-field" placeholder="Email" required>
        <input type="password" id="password" class="input-field" placeholder="Password" required>
        <button type="submit" class="btn">Register</button>
      </form>

      <div class="form-footer">
        Already have an account? 
        <a href="{{ url_for('login_page') }}">Login</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      if (res.ok) {
        alert("Registration successful! Please login.");
        window.location.href = "{{ url_for('login_page') }}";
      } else {
        alert(data.error || "Registration failed");
      }
    });
  </script>
</body>
</html>
